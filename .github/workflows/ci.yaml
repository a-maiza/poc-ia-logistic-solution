name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        run: mvn -B clean package
        working-directory: ai-logistics-triage-java
      - name: Docker build
        run: docker build -t ai-logistics-triage-java:ci .
        working-directory: ai-logistics-triage-java
